services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID}
    ports:
      - "${MSSQL_PORT}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ecommerceapp:
    build:
      context: ./ECommerceApp
      dockerfile: Dockerfile
    container_name: ecommerce-app
    depends_on:
      sqlserver:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__EFCoreDBConnection: ${CONNECTIONSTRINGS__EFCOREDBCONNECTION}
      Jwt__Issuer: ${JWT__ISSUER}
      Jwt__Audience: ${JWT__AUDIENCE}
      Jwt__Key: ${JWT__KEY}
      Jwt__AccessTokenMinutes: ${JWT__ACCESSTOKENMINUTES}
      Jwt__AdminEmails: ${JWT__ADMINEMAILS}
      EmailSettings__MailServer: ${EMAILSETTINGS__MAILSERVER}
      EmailSettings__MailPort: ${EMAILSETTINGS__MAILPORT}
      EmailSettings__SenderName: ${EMAILSETTINGS__SENDERNAME}
      EmailSettings__FromEmail: ${EMAILSETTINGS__FROMEMAIL}
      EmailSettings__Password: ${EMAILSETTINGS__PASSWORD}
      ELASTIC_URI: ${ELASTIC_URI:-http://elasticsearch:9200}
    ports:
      - "${APP_PORT}:8080"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: ecommerce-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.9.0
    container_name: ecommerce-kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"

volumes:
  sqlserver-data:
  esdata: